name: Revisar proyecto

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  revisar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Revisar TypeScript
        run: npm run typecheck

      - name: Revisar el codigo
        run: npm run lint

      - name: Construir la pagina
        run: npm run build
